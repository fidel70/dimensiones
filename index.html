<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Dimensiones</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Registro de Dimensiones - Paciente P001</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Panel de Pensamientos -->
            <div class="bg-white rounded-lg shadow p-4">
                <div class="mb-4">
                    <label class="block text-gray-700">Fecha:</label>
                    <input type="date" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700">Pensamientos registrados:</label>
                    <div id="thoughtsList" class="mt-2 space-y-2">
                        <!-- Los pensamientos se agregarán aquí dinámicamente -->
                    </div>
                </div>
            </div>

            <!-- Panel de Dimensiones -->
            <div class="bg-white rounded-lg shadow p-4">
                <div id="dimensionsPanel">
                    <h2 class="text-xl font-semibold mb-4">Dimensiones del pensamiento</h2>

                    <div class="mb-6">
                        <label class="block text-gray-700">Cantidad de veces:</label>
                        <div class="flex items-center mt-2">
                            <button id="decreaseBtn" class="px-3 py-1 border rounded-l">-</button>
                            <span id="quantityValue" class="px-4 py-1 border-t border-b">0</span>
                            <button id="increaseBtn" class="px-3 py-1 border rounded-r">+</button>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-gray-700">Duración (0-60 min):</label>
                        <input type="number" min="0" max="60" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                    </div>

                    <div class="mb-6">
                        <label class="block text-gray-700">Intensidad (0-10):</label>
                        <input type="range" min="0" max="10" value="5" class="mt-1 block w-full">
                        <span id="intensityValue" class="text-sm text-gray-600">5</span>
                    </div>

                    <div class="mb-6">
                        <h3 class="text-lg font-medium mb-2">Dimensiones registradas hoy:</h3>
                        <div class="overflow-x-auto">
                            <table class="min-w-full">
                                <thead>
                                    <tr>
                                        <th class="px-4 py-2 text-left">Cantidad</th>
                                        <th class="px-4 py-2 text-left">Duración</th>
                                        <th class="px-4 py-2 text-left">Intensidad</th>
                                    </tr>
                                </thead>
                                <tbody id="dimensionsTable">
                                    <!-- Las dimensiones se agregarán aquí dinámicamente -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="mb-6">
                        <p>Total de veces: <span id="totalTimes">0</span></p>
                        <p>Total minutos: <span id="totalMinutes">0</span></p>
                    </div>

                    <button id="saveButton" class="w-full bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                        Guardar Dimensión
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Pensamiento -->
    <div id="thoughtModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-6 max-w-2xl w-full mx-4">
            <h2 class="text-xl font-bold mb-4">Detalle del Pensamiento</h2>
            <button id="closeModal" class="mt-4 bg-gray-300 px-4 py-2 rounded hover:bg-gray-400">
                Cerrar
            </button>
        </div>
    </div>

    <script>
        // Inicialización de variables
        let quantity = 0;
        const quantityValue = document.getElementById('quantityValue');
        const intensityValue = document.getElementById('intensityValue');
        const intensityInput = document.querySelector('input[type="range"]');
        
        // Manejadores de eventos para la cantidad
        document.getElementById('decreaseBtn').addEventListener('click', () => {
            if (quantity > 0) {
                quantity--;
                quantityValue.textContent = quantity;
            }
        });

        document.getElementById('increaseBtn').addEventListener('click', () => {
            quantity++;
            quantityValue.textContent = quantity;
        });

        // Manejador para la intensidad
        intensityInput.addEventListener('input', (e) => {
            intensityValue.textContent = e.target.value;
        });

        // Manejador para el modal
        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('thoughtModal').classList.add('hidden');
        });
    </script>
</body>
</html>
