<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Dimensiones - P001</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <!-- Tu contenido actual -->

    <script>
        // Prueba de conexión a Supabase
        const supabase = window.supabase.createClient(
            'https://dszldxsmbcdntoxfemqt.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzemxkeHNtYmNkbnRveGZlbXF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzI2Mjc5MjUsImV4cCI6MjA0ODIwMzkyNX0.hyhet-K26S5SF12gptH7yeuOfYNnRux-CziIfwDeoDI'
        );

        // Función para probar la conexión al cargar la página
        async function probarConexion() {
            try {
                console.log('Probando conexión a Supabase...');
                const { data, error } = await supabase
                    .from('pensamientos')
                    .select('codigo, pensamiento')
                    .limit(1);

                if (error) throw error;

                console.log('¡Conexión exitosa!', data);
                
                // Mostrar mensaje de éxito en la página
                const mensaje = document.createElement('div');
                mensaje.className = 'fixed bottom-4 right-4 bg-green-500 text-white p-4 rounded-lg shadow-lg';
                mensaje.textContent = '¡Conexión a Supabase exitosa!';
                document.body.appendChild(mensaje);
                
                setTimeout(() => mensaje.remove(), 3000);
                
            } catch (error) {
                console.error('Error de conexión:', error);
                
                // Mostrar error en la página
                const mensaje = document.createElement('div');
                mensaje.className = 'fixed bottom-4 right-4 bg-red-500 text-white p-4 rounded-lg shadow-lg';
                mensaje.textContent = 'Error de conexión: ' + error.message;
                document.body.appendChild(mensaje);
            }
        }

        // Ejecutar prueba al cargar
        window.addEventListener('load', probarConexion);
    </script>
</body>
</html>
